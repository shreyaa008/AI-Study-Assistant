<svg width="680" height="620" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" role="img">
<title>AI Study Assistant architecture diagram</title>
<desc>Student browser to S3 static frontend to API Gateway to four Lambda functions to S3, DynamoDB, and Bedrock, monitored by CloudWatch.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>
<rect width="680" height="620" fill="#faf7ef"/>

<rect x="260" y="20" width="160" height="44" rx="8" fill="#e4dfd0" stroke="#888780" stroke-width="0.75"/>
<text x="340" y="47" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" fill="#1c1b18">Student browser</text>
<line x1="340" y1="64" x2="340" y2="84" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="220" y="84" width="240" height="56" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.75"/>
<text x="340" y="106" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#26215C">S3 static website</text>
<text x="340" y="124" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#3C3489">HTML / CSS / JS frontend</text>
<line x1="340" y1="140" x2="340" y2="160" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="220" y="160" width="240" height="56" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.75"/>
<text x="340" y="182" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#042C53">API Gateway</text>
<text x="340" y="200" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#0C447C">/upload /summarize /ask /quiz /flashcards</text>

<line x1="340" y1="216" x2="115" y2="240" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="340" y1="216" x2="265" y2="240" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="340" y1="216" x2="415" y2="240" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="340" y1="216" x2="565" y2="240" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<rect x="48" y="240" width="135" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.75"/>
<text x="115" y="262" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="600" fill="#04342C">upload_handler</text>
<text x="115" y="280" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#085041">Store notes</text>

<rect x="198" y="240" width="135" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.75"/>
<text x="265" y="262" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="600" fill="#04342C">summarize_handler</text>
<text x="265" y="280" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#085041">Calls Bedrock</text>

<rect x="348" y="240" width="135" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.75"/>
<text x="415" y="262" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" font-weight="600" fill="#04342C">ask_handler</text>
<text x="415" y="280" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#085041">Grounded Q&amp;A</text>

<rect x="498" y="240" width="135" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.75"/>
<text x="565" y="256" text-anchor="middle" font-family="Inter,sans-serif" font-size="12.5" font-weight="600" fill="#04342C">quiz_flashcard</text>
<text x="565" y="270" text-anchor="middle" font-family="Inter,sans-serif" font-size="12.5" font-weight="600" fill="#04342C">_handler</text>
<text x="565" y="286" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#085041">Generates content</text>

<line x1="115" y1="296" x2="140" y2="336" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="265" y1="296" x2="240" y2="336" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="265" y1="296" x2="340" y2="336" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="415" y1="296" x2="340" y2="336" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="415" y1="296" x2="540" y2="336" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="565" y1="296" x2="340" y2="336" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="565" y1="296" x2="540" y2="336" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="115" y1="296" x2="340" y2="336" stroke="#888780" stroke-width="1" opacity="0.3" marker-end="url(#arrow)"/>

<rect x="50" y="336" width="180" height="56" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.75"/>
<text x="140" y="358" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#4A1B0C">S3 notes bucket</text>
<text x="140" y="376" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#712B13">Raw uploaded files</text>

<rect x="250" y="336" width="180" height="56" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.75"/>
<text x="340" y="358" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#4A1B0C">DynamoDB</text>
<text x="340" y="376" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#712B13">Single-table: notes, Q&amp;A, quizzes</text>

<rect x="450" y="336" width="180" height="56" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.75"/>
<text x="540" y="358" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#4A1B0C">Amazon Bedrock</text>
<text x="540" y="376" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#712B13">Claude Haiku 4.5</text>

<line x1="340" y1="392" x2="340" y2="420" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<rect x="220" y="420" width="240" height="56" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.75"/>
<text x="340" y="442" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#2C2C2A">Amazon CloudWatch</text>
<text x="340" y="460" text-anchor="middle" font-family="Inter,sans-serif" font-size="12" fill="#444441">Logs, metrics, dashboard, alarms</text>

<rect x="30" y="500" width="620" height="100" rx="8" fill="#ffffff" stroke="#e4dfd0" stroke-width="1"/>
<text x="50" y="524" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#1c1b18">IAM security model</text>
<text x="50" y="544" font-family="Inter,sans-serif" font-size="11.5" fill="#6b675c">Each Lambda has its own execution role scoped to only the resources it needs</text>
<text x="50" y="562" font-family="Inter,sans-serif" font-size="11.5" fill="#6b675c">(least-privilege). No function has broader access than its job requires.</text>
<text x="50" y="582" font-family="Inter,sans-serif" font-size="11.5" fill="#6b675c">Frontend bucket is public (static files only); notes bucket is private (S3-only access via Lambda).</text>
</svg>
